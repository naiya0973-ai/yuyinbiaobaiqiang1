name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build H5
        run: npm run build:h5
        working-directory: client
        env:
          UNI_INPUT_DIR: .
          NODE_ENV: production
          GITHUB_PAGES: 'true'
          VUE_APP_API_URL: ${{ vars.VUE_APP_API_URL || 'https://voice-confession-wall-api.onrender.com/api' }}

      - name: Write runtime API config for GitHub Pages
        run: |
          API_URL="${{ vars.VUE_APP_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://voice-confession-wall-api.onrender.com/api"
          fi
          sed -i "s|__API_URL_PLACEHOLDER__|${API_URL}|g" client/dist/build/h5/index.html

      - name: Verify build output
        run: test -f client/dist/build/h5/index.html

      - name: Prepare GitHub Pages
        run: touch client/dist/build/h5/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist/build/h5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
