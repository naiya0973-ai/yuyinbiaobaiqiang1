name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Build H5
        run: |
          cd client
          npm run build:h5
        env:
          UNI_INPUT_DIR: .
          NODE_ENV: production
          GITHUB_PAGES: 'true'
          VUE_APP_API_URL: ${{ vars.VUE_APP_API_URL || 'https://voice-confession-wall-api.onrender.com/api' }}

      - name: Verify build output
        run: test -f client/dist/build/h5/index.html

      - name: Prepare GitHub Pages
        run: touch client/dist/build/h5/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/dist/build/h5
          publish_branch: gh-pages
