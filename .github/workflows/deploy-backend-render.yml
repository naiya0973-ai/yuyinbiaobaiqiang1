name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deploy triggered."

      - name: Wait for service
        run: sleep 30

      - name: Health check
        run: |
          URL="${{ vars.RENDER_API_URL || 'https://voice-confession-wall-api.onrender.com' }}"
          curl -fsS "${URL}/health" | grep -q '"status":"ok"'

  setup-reminder:
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK == '' }}
    steps:
      - name: Render not configured
        run: |
          echo "Skip: add RENDER_DEPLOY_HOOK in repo Secrets after creating the Render Web Service."
          echo "See render.yaml and DEPLOY.md for setup steps."
