# Render 部署配置
# 在 Render Dashboard 连接本仓库后，可使用此 Blueprint 一键部署后端

services:
  - type: web
    name: voice-confession-wall-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        value: https://naiya0973-ai.github.io
      - key: ADMIN_ORIGIN
        value: https://naiya0973-ai.github.io
      - key: DEMO_SMS_CODE
        value: "123456"
