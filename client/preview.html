<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Taking HTML</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#ffe4ec,#ffb8c9);color:#333}.box{max-width:430px;height:100vh;margin:auto;background:#fff5f7;position:relative;overflow:hidden}.page{display:none;height:100%;overflow:auto;padding:24px 16px 84px}.on{display:block}.nav{position:absolute;bottom:0;left:0;right:0;height:68px;background:white;display:none;border-top:1px solid #ffe4ec}.nav button{flex:1;border:0;background:white;color:#999}.nav .a{color:#ff6b9d;font-weight:700}.nav b{display:block;font-size:22px}.title{font-size:26px;font-weight:900;color:#ff6b9d}.sub,.time{font-size:13px;color:#999}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.card{background:white;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 12px 28px #ff6b9d22}.btn{border:0;border-radius:22px;padding:13px 18px;background:linear-gradient(135deg,#ff6b9d,#ff8fb3);color:white;font-weight:900}.wide{width:100%}.ghost{border:0;border-radius:18px;padding:10px 14px;background:white;color:#ff6b9d;font-weight:800}.back{width:38px;height:38px;border:0;border-radius:50%;background:white;color:#ff6b9d}.hero{height:100%;display:grid;place-items:center;text-align:center}.brand{font-size:56px;font-weight:1000;color:#ff6b9d;letter-spacing:4px}.bubble{width:180px;height:180px;border-radius:45%;background:white;display:grid;place-items:center;font-size:80px;margin:32px auto;box-shadow:0 16px 38px #ff6b9d33}label{display:block;margin:12px 0 6px;color:#666;font-weight:700;font-size:13px}input,textarea{width:100%;border:1px solid #ffe4ec;border-radius:16px;padding:12px;outline:0}textarea{height:96px;resize:none}.row{display:flex;gap:10px}.row>*{flex:1}.tabs{display:flex;gap:8px;overflow:auto;margin:8px 0 14px}.tab{border:0;border-radius:99px;padding:8px 12px;background:white;color:#777;white-space:nowrap}.tab.a{background:#ff6b9d;color:white}.head{display:flex;align-items:center;gap:10px;margin-bottom:10px}.av{width:42px;height:42px;border-radius:50%;background:#ff6b9d;color:white;display:grid;place-items:center;font-weight:900;flex:none}.grow{flex:1}.name{font-weight:900}.tag{font-size:12px;color:#ff6b9d;background:#ffe4ec;border-radius:99px;padding:5px 10px}.txt{line-height:1.6;color:#555;margin-bottom:12px}.player{display:flex;align-items:center;gap:10px;background:#fff7fa;border-radius:16px;padding:12px}.play{width:38px;height:38px;border:0;border-radius:50%;background:#ff6b9d;color:white}.wave{flex:1;height:24px;background:repeating-linear-gradient(90deg,#ffb8c9 0 4px,transparent 4px 8px);border-radius:8px}.playing{animation:p .7s infinite alternate}@keyframes p{to{opacity:.45}}.acts{display:flex;justify-content:space-between;margin-top:12px;color:#777;font-size:13px}.acts button{border:0;background:0;color:inherit}.liked{color:#f36!important}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cat{border-radius:20px;padding:16px;min-height:115px;color:white;display:flex;flex-direction:column;justify-content:space-between}.rec{width:120px;height:120px;border:0;border-radius:50%;font-size:52px;color:white;background:#ff6b9d}.rec.a{box-shadow:0 0 0 18px #ff6b9d22}.toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);background:#333d;color:white;padding:10px 14px;border-radius:99px;opacity:0;transition:.2s;white-space:nowrap}.toast.a{opacity:1}.empty{text-align:center;color:#999;padding:30px}.comment{display:flex;gap:10px;margin:10px 0}.comment .av{width:32px;height:32px;font-size:13px}.cbody{background:#fff7fa;border-radius:14px;padding:9px;flex:1}@media(min-width:520px){.box{height:860px;margin:20px auto;border-radius:36px;box-shadow:0 30px 80px #0003}}</style></head><body><main class="box"><section id="welcome" class="page on"><div class="hero"><div><div class="brand">Taking</div><p class="sub">说出你的心声</p><div class="bubble">💭</div><button class="btn wide" onclick="show('login')">进入</button><br><br><button class="ghost" onclick="guest()">游客体验</button></div></div></section><section id="login" class="page"><div class="top"><button class="back" onclick="show('welcome')">←</button><div class="grow"><div class="title">登录</div><p class="sub">验证码固定 123456</p></div></div><div class="card"><label>昵称</label><input id="name" placeholder="温柔的小猫"><label>手机号</label><input id="phone" placeholder="请输入手机号"><label>验证码</label><div class="row"><input id="code" placeholder="123456"><button class="btn" onclick="msg('验证码：123456')">获取</button></div><br><button class="btn wide" onclick="login()">开始倾诉</button></div></section><section id="home" class="page"><div class="top"><div><div class="title">💭 Taking</div><p class="sub">语音广场</p></div><button class="back" onclick="msg('搜索演示中')">🔍</button></div><div id="tabs" class="tabs"></div><div id="list"></div></section><section id="post" class="page"><div class="top"><button class="back" onclick="nav('home')">×</button><div class="title">发布</div><button class="ghost" onclick="pub()">发布</button></div><div class="card"><label>分类</label><div id="ptabs" class="tabs"></div><label>内容</label><textarea id="content" placeholder="写下你的心声..."></textarea></div><div class="card" style="text-align:center"><button id="rec" class="rec" onclick="rec()">🎤</button><p id="rt" class="sub">点击模拟录音</p></div></section><section id="detail" class="page"><div class="top"><button class="back" onclick="nav('home')">←</button><div class="title">详情</div><button class="back" onclick="msg('举报成功')">⋯</button></div><div id="detailBox"></div></section><section id="category" class="page"><div class="top"><div><div class="title">分类</div><p class="sub">探索心情</p></div></div><div id="grid" class="grid"></div><div class="card" style="text-align:center"><h3>🎲 随机发现</h3><p class="sub">随机听一条</p><button class="btn wide" onclick="randomV()">开始</button></div></section><section id="ranking" class="page"><div class="top"><div><div class="title">榜单</div><p class="sub">热门声音</p></div></div><div id="rank"></div></section><section id="profile" class="page"><div class="top"><div><div class="title">我的</div><p class="sub">个人中心</p></div></div><div class="card" style="text-align:center"><div id="pav" class="av" style="width:76px;height:76px;margin:auto;font-size:28px">我</div><h2 id="pname">未登录</h2><p id="pphone" class="sub">游客</p><div class="row"><div><b id="mc">0</b><p class="time">发布</p></div><div><b id="ml">0</b><p class="time">获赞</p></div><div><b id="mp">0</b><p class="time">播放</p></div></div></div><button class="btn wide" onclick="reset()">退出 / 重置</button></section><nav id="nav" class="nav"><button data-n="home" onclick="nav('home')"><b>🏠</b>广场</button><button data-n="category" onclick="nav('category')"><b>📂</b>分类</button><button data-n="post" onclick="nav('post')"><b>＋</b>发布</button><button data-n="ranking" onclick="nav('ranking')"><b>🏆</b>榜单</button><button data-n="profile" onclick="nav('profile')"><b>👤</b>我的</button></nav><div id="toast" class="toast"></div></main><script>const C=[['全部','🌈'],['暗恋','💕'],['失恋','💔'],['感谢','🙏'],['道歉','😔'],['吐槽','😤'],['其他','💭']],G=['#ff6b9d,#ff8fb3','#ff9a9e,#fecfef','#a18cd1,#fbc2eb','#89f7fe,#66a6ff','#ffecd2,#fcb69f','#f6d365,#fda085','#d299c2,#fef9d7'];const D=[{id:1,u:'温柔的小猫',cat:1,t:'今天在图书馆又看见你了，想说的话还是没有说出口。',d:42,l:28,p:156,c:[['云朵','勇敢一点呀！']],like:0,time:'10分钟前'},{id:2,u:'安静的星星',cat:3,t:'谢谢雨天借我伞的人，那天真的被温柔接住了。',d:36,l:42,p:210,c:[['青鸟','好暖。']],like:1,time:'28分钟前'},{id:3,u:'勇敢的海风',cat:5,t:'期末周真的太难了，希望听到这条的人也能撑过去。',d:58,l:19,p:93,c:[],like:0,time:'1小时前'}];let S=JSON.parse(localStorage.tk||'null')||{user:null,v:D,cat:0,pcat:1,cur:1,play:null,rec:0};const $=x=>document.getElementById(x),save=()=>localStorage.tk=JSON.stringify(S);function msg(t){$('toast').textContent=t;$('toast').classList.add('a');clearTimeout(window.t);window.t=setTimeout(()=>$('toast').classList.remove('a'),1500)}function show(id){document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));$(id).classList.add('on');$('nav').style.display=['home','post','detail','category','ranking','profile'].includes(id)?'flex':'none';if(id=='home')home();if(id=='category')cat();if(id=='ranking')rank();if(id=='profile')profile();if(id=='detail')detail()}function nav(id){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('a',b.dataset.n==id));show(id)}function guest(){S.user={name:'游客小猫',phone:'guest'};save();nav('home')}function login(){let n=$('name').value.trim()||'温柔的小猫',p=$('phone').value.trim(),c=$('code').value.trim();if(!/^1[3-9]\d{9}$/.test(p))return msg('手机号不正确');if(c!='123456')return msg('验证码错误');S.user={name:n,phone:p};save();msg('登录成功');nav('home')}function renderTabs(){$('tabs').innerHTML=C.map((x,i)=>`<button class="tab ${S.cat==i?'a':''}" onclick="S.cat=${i};save();home()">${x[1]} ${x[0]}</button>`).join('');$('ptabs').innerHTML=C.slice(1).map((x,i)=>`<button class="tab ${S.pcat==i+1?'a':''}" onclick="S.pcat=${i+1};save();renderTabs()">${x[1]} ${x[0]}</button>`).join('')}function card(v){return `<div class="card" onclick="openD(${v.id})"><div class="head"><div class="av">${v.u[0]}</div><div class="grow"><div class="name">${v.u}</div><div class="time">${v.time}</div></div><span class="tag">${C[v.cat][1]} ${C[v.cat][0]}</span></div><div class="txt">${v.t}</div><div class="player" onclick="event.stopPropagation();play(${v.id})"><button class="play">${S.play==v.id?'⏸':'▶'}</button><div class="wave ${S.play==v.id?'playing':''}"></div><span class="time">00:${v.d}</span></div><div class="acts"><button class="${v.like?'liked':''}" onclick="event.stopPropagation();like(${v.id})">❤️ ${v.l}</button><span>💬 ${v.c.length}</span><span>👁️ ${v.p}</span><button onclick="event.stopPropagation();msg('举报成功')">⋯</button></div></div>`}function home(){renderTabs();let a=S.v.filter(v=>!S.cat||v.cat==S.cat);$('list').innerHTML=a.length?a.map(card).join(''):'<div class="empty">还没有语音</div>'}function play(id){S.play=S.play==id?null:id;let v=S.v.find(x=>x.id==id);if(S.play&&v)v.p++;save();home();if($('detail').classList.contains('on'))detail()}function like(id){let v=S.v.find(x=>x.id==id);v.like=!v.like;v.l+=v.like?1:-1;save();home();if($('detail').classList.contains('on'))detail()}function openD(id){S.cur=id;save();show('detail')}function detail(){let v=S.v.find(x=>x.id==S.cur)||S.v[0];$('detailBox').innerHTML=card(v)+`<div class="card"><b>评论 (${v.c.length})</b>${v.c.map(x=>`<div class="comment"><div class="av">${x[0][0]}</div><div class="cbody"><b>${x[0]}</b><p>${x[1]}</p></div></div>`).join('')||'<div class="empty">暂无评论</div>'}<div class="row"><input id="ci" placeholder="写评论"><button class="btn" onclick="comment(${v.id})">发送</button></div></div>`}function comment(id){let t=$('ci').value.trim();if(!t)return msg('请输入评论');let v=S.v.find(x=>x.id==id);v.c.unshift([S.user?.name||'游客',t]);save();detail();msg('评论成功')}function rec(){S.rec=!S.rec;$('rec').classList.toggle('a',S.rec);$('rt').textContent=S.rec?'已生成模拟语音':'点击模拟录音';save()}function pub(){if(!S.user)return msg('请先登录');let t=$('content').value.trim();if(!t)return msg('请输入内容');if(!S.rec)return msg('请先录音');S.v.unshift({id:Date.now(),u:S.user.name,cat:S.pcat,t,d:30+Math.floor(Math.random()*40),l:0,p:0,c:[],like:0,time:'刚刚'});$('content').value='';S.rec=0;save();msg('发布成功');nav('home')}function cat(){$('grid').innerHTML=C.slice(1).map((x,i)=>`<div class="cat" style="background:linear-gradient(135deg,${G[i+1]})" onclick="S.cat=${i+1};save();nav('home')"><h1>${x[1]}</h1><div><b>${x[0]}</b><p>${S.v.filter(v=>v.cat==i+1).length} 条语音</p></div></div>`).join('')}function randomV(){openD(S.v[Math.floor(Math.random()*S.v.length)].id)}function rank(){$('rank').innerHTML=[...S.v].sort((a,b)=>(b.l*2+b.c.length*3+b.p*.5)-(a.l*2+a.c.length*3+a.p*.5)).map((v,i)=>`<div class="card" onclick="openD(${v.id})"><b style="color:#ff6b9d">#${i+1}</b> ${v.t.slice(0,24)}<p class="time">${v.u} · 🔥 ${Math.round(v.l*2+v.c.length*3+v.p*.5)}</p></div>`).join('')}function profile(){let u=S.user||{name:'未登录',phone:'游客'},m=S.v.filter(v=>S.user&&v.u==S.user.name);$('pav').textContent=u.name[0];$('pname').textContent=u.name;$('pphone').textContent=u.phone;$('mc').textContent=m.length;$('ml').textContent=m.reduce((s,v)=>s+v.l,0);$('mp').textContent=m.reduce((s,v)=>s+v.p,0)}function reset(){localStorage.removeItem('tk');location.reload()}renderTabs();</script></body></html>
